; BGMPS2Tool configuration
; volume: output loudness multiplier
; minimum: > 0
; maximum: no fixed maximum
; note: very high values can cause clipping/distortion
; hold_minutes: minimum note hold time for looped tracks
; minimum: 0.1
; maximum: 600
; pre_eq: optional pre-EQ strength before PS2 encoding
; minimum: 0.0
; maximum: 1.0
; note: gently boosts lows and tames harsh upper mids/highs
; pre_lowpass_hz: optional low-pass cutoff before PS2 encoding
; minimum: 0 or 1000
; maximum: 20000
; note: use 0 to disable
;
; Examples:
; volume=1.0
; volume=0.85
; volume=1.20
; hold_minutes=60
; hold_minutes=30
; hold_minutes=90
; pre_eq=0.35
; pre_lowpass_hz=10000

volume=3.0
hold_minutes=600
pre_eq=0.0
pre_lowpass_hz=0
