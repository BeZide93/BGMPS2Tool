; BGMPS2Tool configuration
; This file is still used by both the batch workflow and the GUI.
; The GUI writes the same keys that the CLI expects.

volume=3
sf2_volume=1
sf2_bank_mode=used
sf2_pre_eq=0
sf2_pre_lowpass_hz=0
sf2_auto_lowpass=0
; sf2_loop_policy: safe = patched v0.9.2 loop path (default, quietest), advanced = decoded-ADPCM loop scoring, auto-loop = ignore SF2 loop points and search new 28-sample-aligned loop points, advanced-auto-loop = search 28-sample loop points near the original SF2 loop window.
sf2_loop_policy=auto-loop
sf2_loop_micro_crossfade=0
; sf2_loop_tail_wrap_fill: fills the last partial PSX-ADPCM loop frame from the loop start instead of leaving the encoder to zero-pad that partial frame.
sf2_loop_tail_wrap_fill=0
; sf2_loop_start_content_align: safe-policy only; moves the actual SF2 loop body onto the WD 28-sample loop-start block instead of looping earlier pre-loop material.
sf2_loop_start_content_align=0
; sf2_loop_end_content_align: safe-policy test path; prepends up to 27 silent samples so the original SF2 loop end lands on a 28-sample WD block. If enabled, start-content alignment is skipped for that sample.
sf2_loop_end_content_align=0
midi_program_compaction=preserve
adsr=authored
midi_pitch_bend_workaround=0
midi_loop=1
hold_minutes=600
pre_eq=0
pre_lowpass_hz=0
