; BGMPS2Tool configuration
; volume: output loudness multiplier
; note: affects the WAV -> PS2 replacement path
; minimum: > 0
; maximum: no fixed maximum
; note: very high values can cause clipping/distortion
; sf2_volume: output loudness multiplier for MIDI + SF2 -> PS2 conversion
; note: keep this at 1.0 if you want the closest possible SF2 roundtrip fidelity
; minimum: > 0
; maximum: no fixed maximum
; sf2_bank_mode: how much of the SoundFont should be authored into the WD
; note: use "used" to author only presets referenced by the MIDI, or "full" to author the full SF2 bank
; sf2_pre_eq: optional pre-EQ strength for SoundFont sample import after 44100 Hz normalization
; minimum: 0.0
; maximum: 1.0
; note: gently boosts lows and tames harsh upper mids/highs for the MIDI + SF2 workflow
; sf2_pre_lowpass_hz: optional manual low-pass cutoff for SoundFont sample import after 44100 Hz normalization
; minimum: 0 or 1000
; maximum: 20000
; note: use 0 to disable the manual override
; sf2_auto_lowpass: automatically low-pass non-44100 Hz SoundFont samples near their original bandwidth after normalization
; note: use 1 to enable or 0 to disable
; midi_pitch_bend_workaround: approximates MIDI pitch bend by retargeting notes and optionally cloning tuned instrument states
; note: use 1 to enable or 0 to disable
; note: disabling this can reduce extra authored instruments, but pitch bend events will then be ignored
; midi_loop: loop the authored MIDI/BGM sequence
; note: use 0 to disable or 1 to enable
; minimum: 0
; maximum: 1
; hold_minutes: minimum note hold time for looped tracks
; minimum: 0.1
; maximum: 600
; pre_eq: optional pre-EQ strength before PS2 encoding
; minimum: 0.0
; maximum: 1.0
; note: gently boosts lows and tames harsh upper mids/highs
; pre_lowpass_hz: optional low-pass cutoff before PS2 encoding
; minimum: 0 or 1000
; maximum: 20000
; note: use 0 to disable
;
; Examples:
; volume=1.0
; volume=0.85
; volume=1.20
; sf2_volume=1.0
; sf2_bank_mode=used
; sf2_bank_mode=full
; sf2_pre_eq=0.0
; sf2_pre_eq=0.35
; sf2_pre_lowpass_hz=0
; sf2_pre_lowpass_hz=16000
; sf2_auto_lowpass=0
; sf2_auto_lowpass=1
; midi_pitch_bend_workaround=1
; midi_pitch_bend_workaround=0
; midi_loop=0
; midi_loop=1
; hold_minutes=60
; hold_minutes=30
; hold_minutes=90
; pre_eq=0.35
; pre_lowpass_hz=10000

volume=3.0
sf2_volume=1.0
sf2_bank_mode=used
sf2_pre_eq=0.0
sf2_pre_lowpass_hz=0
sf2_auto_lowpass=0
midi_pitch_bend_workaround=1
midi_loop=1
hold_minutes=600
pre_eq=0.0
pre_lowpass_hz=0

