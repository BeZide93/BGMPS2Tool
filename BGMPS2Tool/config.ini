sf2_volume=1
sf2_bank_mode=used
sf2_pre_eq=0
sf2_pre_lowpass_hz=0
sf2_auto_lowpass=0
midi_program_compaction=preserve
adsr=authored
midi_pitch_bend_workaround=0
midi_loop=1
hold_minutes=600
pre_eq=0
pre_lowpass_hz=0
